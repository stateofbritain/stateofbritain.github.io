name: Dashboard data refresh

# Schedule-aware fetcher. Runs once a day at 06:00 UTC (07:00 UK BST /
# 06:00 UK GMT) and consults scripts/release-schedule.json to decide
# which fetches are due. Each script's rule encodes its upstream
# release pattern (3rd-Wed CPI, 2nd-Thu GDP day, last-Thu DESNZ, etc.)
# plus a buffer day, so we never hit a stale endpoint right at release.
#
# Secrets required (Settings → Secrets and variables → Actions):
#   EPC_EMAIL                 — registration email for EPC Open Data
#   EPC_API_KEY               — EPC API key
#   COMPANIES_HOUSE_API_KEY   — Companies House public data API key

on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC — dispatcher decides what to run
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "scheduled"
        type: choice
        options: [scheduled, all]
      override_date:
        description: "Override date (YYYY-MM-DD) — only used in scheduled mode"
        required: false
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EPC_EMAIL: ${{ secrets.EPC_EMAIL }}
      EPC_API_KEY: ${{ secrets.EPC_API_KEY }}
      COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run scheduled fetches
        run: |
          MODE="${{ github.event.inputs.mode || 'scheduled' }}"
          DATE="${{ github.event.inputs.override_date }}"
          if [ "$MODE" = "all" ]; then
            node scripts/run-scheduled-fetches.js --all
          elif [ -n "$DATE" ]; then
            node scripts/run-scheduled-fetches.js "$DATE"
          else
            node scripts/run-scheduled-fetches.js
          fi

      - name: Validate fetched data
        run: node scripts/validate-data.js || true

      - name: Sync to API directory
        run: node scripts/sync-api-data.js || true

      - name: Commit changes
        run: |
          if git diff --quiet -- public/data public/api/data; then
            echo "No data changes; nothing to commit"
            exit 0
          fi
          git config user.name  "dashboard-bot"
          git config user.email "dashboard-bot@stateofbritain.uk"
          git add public/data public/api/data
          git commit -m "Auto: dashboard data refresh ($(date -u +%Y-%m-%d))"
          git push
