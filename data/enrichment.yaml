    completionsByTenure:
      title: "New Build Completions by Tenure"
      summary: "Completions split by private enterprise (80%+), housing associations, and local authorities (~3,000/yr)."
      unit: "dwellings"
    newBuildSize:
      title: "Average New Build Floor Area"
      summary: "Average internal floor area of new build homes. Declined from 83 sqm in 2003 to 76 sqm in 2023."
      unit: "sqm"
    sizeIntl:
      title: "International New Build Size Comparison"
      summary: "Average new build floor area by country. UK (76 sqm) among the smallest. Australia 229, US 201, Germany 109."
      unit: "sqm"

