hate-crime:
  title: "Hate Crime"
  geography: "England & Wales"
  summary: "Police-recorded hate crimes by monitored strand from 2011/12 to 2024/25 (excl. Metropolitan Police for comparability). 115,990 total offences in 2024/25. Race is the largest strand (82,490), followed by sexual orientation (18,702), disability (10,224), religion (7,164), and transgender (3,809). Recording improvements since 2014 mean increases partly reflect better police practice, not necessarily higher prevalence. Religious hate crimes are broken down by perceived religion: Muslim (3,199), Jewish (1,715), Christian (401), Sikh (202), Hindu (118)."
  tags: [hate crime, racism, racist, racial, religion, antisemitism, antisemitic, Islamophobia, homophobia, transphobia, disability, hate, prejudice, discrimination, violence, police, recorded crime, Home Office, bigotry, intolerance, targeted]
  series:
    byStrand:
      title: "Hate Crimes by Monitored Strand"
      summary: "Police-recorded hate crimes by strand (race, religion, sexual orientation, disability, transgender) from 2011/12 to 2024/25. Excludes Metropolitan Police. Race accounts for 71% of all hate crime motivating factors. Total rose from 33,950 in 2011/12 to 122,389 in 2024/25, partly due to improved recording."
      unit: "offences"
    byReligion:
      title: "Religious Hate Crimes by Perceived Religion"
      summary: "Religious hate crimes by perceived religion of the victim (2021/22-2024/25, excl. Met Police). Muslim victims account for 46% of religious hate crimes (3,199), Jewish victims 24% (1,715). Jewish hate crimes peaked at 2,093 in 2023/24 following events in the Middle East."
      unit: "offences"

infrastructure:
  title: "Infrastructure"
  geography: "United Kingdom"
  summary: "Broadband (FTTP, gigabit coverage), rail (punctuality, journeys), and road (traffic, condition) metrics."
  tags: [infrastructure, broadband, rail, roads, transport, digital]

buses:
  title: "Buses"
  geography: "Great Britain"
  summary: "Bus passenger journeys, fares, and fleet size. GB total journeys fell from 4.9bn (2006/07) to 4.1bn (2024/25). London accounts for 45% of all journeys. Bus fares have risen 108% since 2005, compared to 77% for CPI. The GB bus fleet fell from 52,190 to 35,065 vehicles over the same period."
  tags: [buses, bus, coach, public transport, passenger journeys, bus fares, fleet, London, metropolitan, transport, DfT, patronage, ridership, concessionary, free bus pass, bus pass, older persons, disabled, ENCTS, freedom pass, free travel]
  series:
    journeysByRegion:
      title: "Passenger Journeys by Region"
      summary: "Annual bus journeys by area from 2004/05. London grew from 1.8bn to 1.8bn (stable). English metro areas fell from 1.0bn to 0.8bn. Scotland fell from 459M to 335M. Wales fell from 123M to 72M."
      unit: "millions"
    journeysHistorical:
      title: "Bus Patronage Since 1950"
      summary: "Long-run GB bus journeys from 1949/50. Peaked at 13.2bn in 1954/55, declined to 4.1bn by 2024/25. Car ownership drove the decline from the 1960s."
      unit: "millions"
    faresIndex:
      title: "Bus Fares Index"
      summary: "Quarterly fares index (March 2005 = 100). GB fares index reached 208 by Q4 2025. England outside London rose to 214, London to 196. CPI comparison included at 177."
      unit: "index (2005=100)"
    fleetSize:
      title: "Fleet Size by Area"
      summary: "Number of registered buses by area. GB fleet fell from 52,190 (2004/05) to 35,065 (2024/25). London fleet stable at ~9,000. Largest decline in English non-metro areas."
      unit: "vehicles"
    concessionaryPct:
      title: "Concessionary Journeys as % of Total"
      summary: "Share of bus journeys made using free concessionary passes. England 28%, Scotland 55% (after under-22s scheme in 2022), Wales 45%. England's share fell from 32% pre-pandemic."
      unit: "%"
    passHolders:
      title: "Concessionary Pass Holders (England)"
      summary: "8.9 million concessionary passes in England (2024/25). 89% older persons, 11% disabled. Average 70 journeys per pass, down from 110 in 2010/11."
      unit: "thousands"
    expenditure:
      title: "Concessionary Travel Expenditure"
      summary: "Net local authority expenditure on concessionary travel in England: £1.02bn in 2024/25. Operator reimbursement £795m. Average reimbursement £1.27 per journey."
      unit: "£ million"

airports:
  title: "Airports"
  geography: "United Kingdom"
  summary: "UK airport passenger traffic, air transport movements, capacity trends, and airport rankings. 292 million passengers across 49 airports in 2024, with ~5,800 commercial flights per day. Flights peaked at 2.35M in 2007 and have not recovered to that level. COVID collapsed traffic to 74 million passengers in 2020."
  tags: [airports, aviation, flights, passengers, Heathrow, Gatwick, air travel, transport, CAA, capacity, runway, movements, commercial flights, scheduled flights, how many airports, plane]
  series:
    annualPassengers:
      title: "Total Terminal Passengers"
      summary: "UK airport passengers grew from 228M (2005) to 297M (2019), collapsed to 74M (2020), recovered to 292M (2024)."
      unit: "passengers"
    annualMovements:
      title: "Air Transport Movements"
      summary: "Flights peaked at 2.35M in 2007, declined post-financial crisis, plateaued at 2.2M (2017-19), collapsed to 812K (2020), recovered to 2.01M (2024) — still 86% of 2007 peak. No major new runway capacity added."
      unit: "movements"
    paxPerFlight:
      title: "Passengers per Flight"
      summary: "Average passengers per air transport movement rose from 101 (2005) to 145 (2024), reflecting larger aircraft and higher load factors. COVID distorted the metric (2020-21)."
      unit: "passengers/movement"
    passengersByAirport:
      title: "Passengers by Airport (2024)"
      summary: "Heathrow leads with 84M passengers (29% of UK total). Gatwick 43M, Manchester 31M, Stansted 30M. 49 airports reported traffic."
      unit: "passengers"
    movementsByAirport:
      title: "Air Transport Movements by Airport (2024)"
      summary: "Total 2.1M air transport movements in 2024. Heathrow 474k, Gatwick 262k, Stansted 188k."
      unit: "movements"
    airportLocations:
      title: "UK Airport Locations with Traffic Data (2024)"
      summary: "Geographic coordinates, passenger counts, and movement figures for 47 UK airports. Used for map visualization. Heathrow (51.47N, 0.45W) leads with 84M passengers."
      unit: "mixed"

