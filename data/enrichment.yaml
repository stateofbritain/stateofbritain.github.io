      title: "EPC Rating by Dwelling Age"
      summary: "Only 2% of pre-1919 homes rated EPC A-B vs 55% of post-2002 homes. 45% of pre-1919 rated E or below."
      unit: "%"

housing-density:
  title: "Housing Density & Geography"
  geography: "United Kingdom"
