# ─── State of Britain: Dataset Enrichment ────────────────────────────
# Manual summaries, tags, and series-level metadata for the catalog.
# Used by scripts/generate-catalog.js to produce data/catalog.json.
# This file is NOT served to the browser.

family:
  title: "Family, Fertility & Households"
  geography: "England & Wales"
  summary: "Birth rates, fertility by parity, mean age of motherhood, family structure, and household composition. Covers 1960 to present."
  tags: [fertility, births, TFR, households, family structure, demographics]
  series:
    tfrByOrder:
      title: "Total Fertility Rate by Birth Order"
      summary: "UK TFR fell from 2.72 in 1960 to 1.41 in 2024, now 33% below replacement. Rising childlessness is the primary driver."
      unit: "children per woman"
    meanAgeByOrder:
      title: "Mean Age of Mother by Birth Order"
      summary: "Mean age at first birth rose from 24.4 in 1960 to 29.5 in 2022, a shift of over 5 years."
      unit: "years"
    birthsSeries:
      title: "Live Births"
      summary: "Annual live births in England & Wales. Peaked at 876k in 1964, now around 595k."
      unit: "thousands"
    familyTypeSeries:
      title: "Family Type"
      summary: "Breakdown of families by type: married couples, cohabiting couples, and lone parents."
      unit: "thousands"
    householdSizeSeries:
      title: "Average Household Size"
      summary: "Average number of people per household. Fell from 3.09 in 1961 to 2.35 in 2024."
      unit: "persons"

education:
  title: "Education & Skills"
  geography: "England"
  summary: "Per-pupil spending, GCSE results, PISA scores, HE participation, teacher workforce, and degree classification trends."
  tags: [education, schools, GCSE, PISA, universities, teachers, spending]
  series:
    perPupilSpending:
      title: "Per-Pupil Spending (real terms)"
      summary: "Real per-pupil spending peaked at £6,720 in 2009-10, fell 6% to £6,310 by 2023-24."
      unit: "£ (real terms)"
    gcseResults:
      title: "GCSE Grade 5+ in English & Maths"
      summary: "Share of students achieving grade 5+ in English and Maths. Grading changed from A*-G to 9-1 in 2017."
      unit: "%"
    pisaScores:
      title: "PISA International Scores"
      summary: "UK PISA scores in maths (489), reading (494), and science (503) as of 2022."
      unit: "score"
    heParticipation:
      title: "Higher Education Participation"
      summary: "HE participation rate reached 52% in 2022-23."
      unit: "%"
    teacherWorkforce:
      title: "Teacher Workforce"
      summary: "Number of teachers and pupil-teacher ratios in state schools."
      unit: "thousands"

defence:
  title: "Defence & Security"
  geography: "United Kingdom"
  summary: "Defence spending as % of GDP, personnel strength, reserves, equipment plans, and NATO comparisons."
  tags: [defence, military, NATO, spending, armed forces]
  series:
    spendingPctGdp:
      title: "Defence Spending as % of GDP"
      summary: "UK defence spending fell from 3.8% GDP in 1990 to 2.3% in 2024, above NATO's 2% target."
      unit: "% GDP"
    personnel:
      title: "Armed Forces Personnel"
      summary: "Total trained personnel declined 38% from 207.7k in 2000 to 129.2k in 2024."
      unit: "thousands"

startups:
  title: "Business Startups & Entrepreneurship"
  geography: "United Kingdom"
  summary: "Business births and deaths, survival rates, sector breakdown, high-growth firms, and equity investment."
  tags: [startups, business, entrepreneurship, SMEs, venture capital]

research:
  title: "Research & Development"
  geography: "United Kingdom"
  summary: "R&D spending by sector (government, business, higher education), as % of GDP, and international comparison."
  tags: [R&D, research, science, innovation, universities]

productivity:
  title: "Productivity"
  geography: "United Kingdom"
  summary: "Output per hour worked (index and level), sector breakdown, and international comparison."
  tags: [productivity, output, efficiency, GDP per hour]

investment:
  title: "Investment"
  geography: "United Kingdom"
  summary: "UK gross fixed capital formation trend, asset breakdown, and international comparison."
  tags: [investment, capital, GFCF, infrastructure]

immigration:
  title: "Immigration & Demographics"
  geography: "United Kingdom"
  summary: "Net migration, visa breakdown, asylum applications, population projections, age structure, and dependency ratios."
  tags: [immigration, migration, population, demographics, asylum, visas]

justice:
  title: "Justice & Crime"
  geography: "England & Wales"
  summary: "Crime trends, police workforce, prison population, court backlog, and charge rates."
  tags: [crime, justice, police, prisons, courts]

infrastructure:
  title: "Infrastructure"
  geography: "United Kingdom"
  summary: "Broadband (FTTP, gigabit coverage), rail (punctuality, journeys), and road (traffic, condition) metrics."
  tags: [infrastructure, broadband, rail, roads, transport, digital]

energy:
  title: "Energy"
  geography: "United Kingdom"
  summary: "Energy mix, fuel consumption, electricity generation, household expenditure, import dependency, and storage."
  tags: [energy, electricity, renewables, gas, oil, nuclear]

water:
  title: "Water Industry"
  geography: "England & Wales"
  summary: "Water company performance, leakage rates, pollution incidents, and storm overflow events."
  tags: [water, utilities, pollution, sewage, leakage]

nhs-waiting:
  title: "NHS Waiting Lists"
  geography: "England"
  summary: "NHS referral-to-treatment waiting times, A&E performance, waiting lists by specialty and procedure."
  tags: [NHS, healthcare, waiting times, hospitals, A&E]

health-outcomes:
  title: "Health Outcomes"
  geography: "United Kingdom / England & Wales"
  summary: "Life expectancy at birth by sex, cancer survival rates by type, and avoidable mortality trends."
  tags: [health, life expectancy, cancer, mortality, outcomes]
  series:
    lifeExpectancy:
      title: "Life Expectancy at Birth"
      summary: "UK life expectancy reached 79.0 (male) and 82.9 (female) in 2023, still below 2014 peak after COVID setback."
      unit: "years"
    cancerSurvival:
      title: "Cancer Survival Rates"
      summary: "1-year and 5-year net survival by cancer site. Ranges from 7% (pancreas) to 92% (melanoma) at 5 years."
      unit: "%"
    avoidableMortality:
      title: "Avoidable Mortality"
      summary: "Age-standardised avoidable mortality rate fell from 257 per 100k in 2001 to 201 in 2019, spiked during COVID."
      unit: "per 100,000"

hospital-capacity:
  title: "Hospital Capacity"
  geography: "England"
  summary: "NHS overnight bed numbers by type, bed occupancy rates, international comparison (OECD), and hospital admissions by type."
  tags: [hospital, beds, capacity, occupancy, admissions, OECD, elective, emergency]
  series:
    beds:
      title: "Overnight Beds by Type"
      summary: "Total NHS overnight beds fell from 186k in 2000-01 to 101k in 2025-26, a 46% reduction."
      unit: "beds"
    occupancy:
      title: "Bed Occupancy Rate"
      summary: "General & acute bed occupancy rose from 82% in 2000-01 to 90.5% in 2025-26."
      unit: "%"
    international:
      title: "International Comparison (OECD)"
      summary: "UK has 2.4 beds per 1,000 population vs OECD average of 4.3."
      unit: "beds per 1,000"
    admissions:
      title: "Hospital Admissions"
      summary: "20.6m admissions in 2024-25: 8.6m day cases, 6.6m emergency, 5.4m elective."
      unit: "thousands"

nhs-workforce:
  title: "NHS Workforce"
  geography: "England"
  summary: "NHS HCHS staff headcount and FTE by staff group, vacancy rates by profession, and sickness absence rates."
  tags: [NHS, workforce, doctors, nurses, vacancies, sickness, staffing]
  series:
    staffByGroup:
      title: "Staff by Group (FTE)"
      summary: "NHS HCHS workforce grew from 1.05m FTE in 2010 to 1.38m in 2025, up 31%."
      unit: "FTE"
    vacancies:
      title: "Vacancy Rates"
      summary: "Overall vacancy rate peaked at 9.7% in Q3 2022, fell to 6.7% by Q3 2025."
      unit: "%"
    sickness:
      title: "Sickness Absence"
      summary: "Sickness rate was 4.1-4.4% pre-pandemic, rose to 5.8% in 2021, at 5.2% in 2025."
      unit: "%"

gp-access:
  title: "General Practice"
  geography: "England"
  summary: "GP appointments, patient satisfaction, same-day access, practice consolidation, workforce (headcount vs FTE), and training pipeline."
  tags: [GP, general practice, primary care, appointments, workforce, patients, satisfaction, training]
  series:
    appointments:
      title: "GP Appointments by Type"
      summary: "Around 30m GP appointments per month. Online grew from 4% to ~20% since COVID."
      unit: "millions"
    appointmentWait:
      title: "Time from Booking to Appointment"
      summary: "~45% of GP appointments are same-day, 73% within a week. Stable since 2019."
      unit: "%"
    satisfaction:
      title: "Patient Satisfaction (GPPS)"
      summary: "Overall good fell from 85% (2018) to 71% (2023). Phone access hardest-hit."
      unit: "%"
    practices:
      title: "Practice Count & List Size"
      summary: "~2,000 practices closed/merged since 2013. Avg list size rose from 6,900 to 9,900."
      unit: "count / patients"
    trainingPipeline:
      title: "GP Training Pipeline"
      summary: "ST1 posts expanded to 4,276 (100% filled). 10,900 trainees in system but conversion lossy."
      unit: "posts / FTE"
    workforce:
      title: "GP Workforce (Headcount vs FTE)"
      summary: "Headcount grew to 35,900 but FTE fell to 27,544 — driven by part-time working, not fewer GPs."
      unit: "FTE / headcount"

cpih:
  title: "Consumer Prices (CPIH)"
  geography: "United Kingdom"
  summary: "Consumer Prices Index including owner-occupier housing costs, broken down by category."
  tags: [inflation, prices, CPIH, cost of living, CPI]

spending:
  title: "Government Spending"
  geography: "United Kingdom"
  summary: "Total managed expenditure, spending as % of GDP, tax receipts, departmental spending trends, and debt."
  tags: [spending, tax, budget, fiscal, debt, GDP]

industrial:
  title: "Industrial Strategy"
  geography: "United Kingdom"
  summary: "Industrial output by sector, manufacturing trends, and structural economic composition."
  tags: [industry, manufacturing, sectors, industrial strategy]

environment:
  title: "Environment & Air Quality"
  geography: "United Kingdom"
  summary: "Greenhouse gas emissions, PM2.5 and NO2 air quality, and ultra-low emission vehicle uptake."
  tags: [environment, emissions, air quality, climate, EVs, pollution]

workforce:
  title: "Public Sector Workforce"
  geography: "United Kingdom"
  summary: "Workforce size and trends in NHS, education, police, and university sectors."
  tags: [workforce, public sector, NHS staff, teachers, police, employment]

local-government:
  title: "Local Government Finance"
  geography: "England"
  summary: "Council spending by service, funding sources, council tax levels, financial health (section 114 notices, reserves, audit backlog), social care squeeze, core spending power, and workforce trends."
  tags: [local government, councils, council tax, social care, section 114, reserves, audit, local authority, spending, DLUHC]
  series:
    serviceSpending:
      title: "Service Spending by Category"
      summary: "Net current expenditure by service area. Adult social care £25.2bn, children's social care £15.6bn in 2024-25. Total excluding education £89.8bn."
      unit: "£bn"
    fundingSources:
      title: "Revenue Funding Mix"
      summary: "Share of council revenue by source. Council tax rose from 34% (2010-11) to peak 52% (2019-20), settling at 46% (2024-25) as government grants were cut then partially restored."
      unit: "%"
    councilTax:
      title: "Average Band D Council Tax"
      summary: "Average Band D council tax rose from £1,439 (2010-11) to £2,280 (2025-26), a 58% increase in cash terms."
      unit: "£"
    councilTaxByRegion:
      title: "Council Tax by Region"
      summary: "Band D council tax varies by area: London £1,982, Metropolitan £2,289, Unitary £2,366, Shire £2,344 (2025-26)."
      unit: "£"
    section114:
      title: "Section 114 Notices"
      summary: "Seven councils issued section 114 notices between 2018 and 2023: Northamptonshire, Croydon, Slough, Thurrock, Woking, Birmingham, Nottingham."
      unit: "count"
    reserves:
      title: "Usable Reserves"
      summary: "Local authority usable reserves rose from £13bn (2010-11) to £31.2bn peak (2021-22), then fell to £27bn (2024-25)."
      unit: "£bn"
    auditBacklog:
      title: "Audit Backlog"
      summary: "Outstanding unaudited council accounts peaked at 918 (2022-23), reduced to ~100 after 2024 statutory backstop."
      unit: "count"
    workforce:
      title: "Local Government Workforce"
      summary: "Council FTE fell from 1,510k (2010) to 970k (2025), a 36% reduction. Excludes police, fire, centrally-funded teachers."
      unit: "thousands FTE"
    socialCareShare:
      title: "Social Care Share of Spending"
      summary: "Social care rose from 42% to 47% of non-education council spending between 2010-11 and 2024-25."
      unit: "%"
    coreSpendingPower:
      title: "Core Spending Power per Person"
      summary: "Real-terms core spending power per person fell 27% from 2010-11 to 2015-16. In 2024-25 it remains 18% below 2010-11 levels."
      unit: "index"

money-supply:
  title: "Money Supply & Inflation"
  geography: "United Kingdom"
  summary: "M4 broad money supply, Bank of England quantitative easing (APF holdings and cash flows), CPI inflation, real wage growth, purchasing power erosion, international central bank balance sheet comparison, and nominal vs real government debt."
  tags: [money supply, M4, inflation, CPI, quantitative easing, QE, APF, real wages, purchasing power, central bank, Bank of England, monetary policy]
  series:
    m4ToGdp:
      title: "M4 Money Supply and GDP"
      summary: "M4 grew from £867bn (2000) to £3.2tn (2025). M4/GDP ratio rose from 86% to 116%, peaking at 139% in 2020."
      unit: "£bn / %"
    apfHoldings:
      title: "APF Gilt Holdings"
      summary: "Bank of England gilt purchases peaked at £895bn in January 2022. Reduced to £488bn by end-2025 through quantitative tightening."
      unit: "£bn"
    apfCashFlows:
      title: "APF Cash Flows to Treasury"
      summary: "APF transferred £124bn to Treasury between 2012-22, then reversed. OBR estimates lifetime net cost at £134bn."
      unit: "£bn"
    cpiRate:
      title: "CPI Annual Inflation Rate"
      summary: "CPI averaged close to 2% target from 2000-2020, spiked to 9.1% in 2022, returned to 3.2% in 2025."
      unit: "%"
    realWages:
      title: "Real Wage Growth"
      summary: "Real wages fell in 6 of 7 years from 2008-14, and again in 2022 (-3.3%). Positive real growth resumed in 2024."
      unit: "%"
    purchasingPower:
      title: "Purchasing Power Index"
      summary: "£1 in 2000 buys approximately 55p of goods in 2025 terms, a 45% erosion in purchasing power."
      unit: "pence per £1 (2000)"
    debtNominalVsReal:
      title: "Government Debt: Nominal vs Real"
      summary: "PSND rose from £311bn (2000-01) to £2,805bn (2024-25) in nominal terms. In real terms (2000-01 prices), the increase is smaller."
      unit: "£bn"
    balanceSheets:
      title: "Central Bank Balance Sheets"
      summary: "BoE balance sheet peaked at 44% GDP (2021), BoJ at 137% (2022), ECB at 60% (2022), Fed at 35% (2022). All now contracting."
      unit: "% GDP"

taxation:
  title: "Taxation"
  geography: "United Kingdom"
  summary: "Tax receipts by type, tax burden as % of GDP, tax gap, income tax concentration by percentile, corporation tax rate history, personal allowance thresholds, and international comparisons."
  tags: [tax, taxation, income tax, NICs, VAT, corporation tax, council tax, tax burden, tax gap, HMRC, OBR, OECD]
  series:
    receiptsByType:
      title: "Tax Receipts by Type"
      summary: "HMRC collected £858.6bn in 2024-25. Income tax (£310bn), NICs (£174bn), and VAT (£171bn) are the three largest sources."
      unit: "£bn"
    taxBurden:
      title: "Tax Burden as % of GDP"
      summary: "UK tax burden at 35.3% of GDP in 2024-25, forecast to reach 38.0% by 2029-30, a post-war high."
      unit: "% GDP"
    intlTaxBurden:
      title: "Tax-to-GDP International Comparison"
      summary: "UK at 35.3% compared to OECD average of 33.7%. Ranges from 17.7% (Mexico) to 43.8% (France)."
      unit: "% GDP"
    taxGap:
      title: "Tax Gap"
      summary: "Estimated at £46.8bn (5.3%) in 2023-24, up from 4.8% in 2021-22. Corporation tax accounts for 40% of the gap."
      unit: "£bn / %"
    taxConcentration:
      title: "Income Tax Concentration"
      summary: "Top 1% paid 29.1% of all income tax in 2022-23, up from 21.3% in 1999-2000. Top 10% paid 59.8%."
      unit: "%"
    corpTaxRate:
      title: "Corporation Tax Main Rate"
      summary: "Fell from 52% in 1982 to 19% in 2017, raised back to 25% in April 2023."
      unit: "%"
    thresholds:
      title: "Personal Allowance & Thresholds"
      summary: "Personal allowance frozen at £12,570 since 2021-22, extended to April 2031."
      unit: "£"
    taxpayersByBand:
      title: "Income Taxpayers by Rate Band"
      summary: "34.5m income taxpayers in 2024-25. Higher and additional rate taxpayers rising due to threshold freeze."
      unit: "millions"
