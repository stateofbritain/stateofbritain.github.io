# ─── State of Britain: Dataset Enrichment ────────────────────────────
# Manual summaries, tags, and series-level metadata for the catalog.
# Used by scripts/generate-catalog.js to produce data/catalog.json.
# This file is NOT served to the browser.

family:
  title: "Family, Fertility & Households"
  geography: "England & Wales"
  summary: "Birth rates, fertility by parity, mean age of motherhood, family structure, and household composition. Covers 1960 to present."
  tags: [fertility, births, TFR, households, family structure, demographics]
  series:
    tfrByOrder:
      title: "Total Fertility Rate by Birth Order"
      summary: "UK TFR fell from 2.72 in 1960 to 1.41 in 2024, now 33% below replacement. Rising childlessness is the primary driver."
      unit: "children per woman"
    meanAgeByOrder:
      title: "Mean Age of Mother by Birth Order"
      summary: "Mean age at first birth rose from 24.4 in 1960 to 29.5 in 2022, a shift of over 5 years."
      unit: "years"
    birthsSeries:
      title: "Live Births"
      summary: "Annual live births in England & Wales. Peaked at 876k in 1964, now around 595k."
      unit: "thousands"
    familyTypeSeries:
      title: "Family Type"
      summary: "Breakdown of families by type: married couples, cohabiting couples, and lone parents."
      unit: "thousands"
    householdSizeSeries:
      title: "Average Household Size"
      summary: "Average number of people per household. Fell from 3.09 in 1961 to 2.35 in 2024."
      unit: "persons"

education:
  title: "Education & Skills"
  geography: "England"
  summary: "Per-pupil spending, GCSE results, PISA scores, HE participation, teacher workforce, and degree classification trends."
  tags: [education, schools, GCSE, PISA, universities, teachers, spending]
  series:
    perPupilSpending:
      title: "Per-Pupil Spending (real terms)"
      summary: "Real per-pupil spending peaked at £6,720 in 2009-10, fell 6% to £6,310 by 2023-24."
      unit: "£ (real terms)"
    gcseResults:
      title: "GCSE Grade 5+ in English & Maths"
      summary: "Share of students achieving grade 5+ in English and Maths. Grading changed from A*-G to 9-1 in 2017."
      unit: "%"
    pisaScores:
      title: "PISA International Scores"
      summary: "UK PISA scores in maths (489), reading (494), and science (503) as of 2022."
      unit: "score"
    heParticipation:
      title: "Higher Education Participation"
      summary: "HE participation rate reached 52% in 2022-23."
      unit: "%"
    teacherWorkforce:
      title: "Teacher Workforce"
      summary: "Number of teachers and pupil-teacher ratios in state schools."
      unit: "thousands"

defence:
  title: "Defence & Security"
  geography: "United Kingdom"
  summary: "Defence spending, armed forces personnel, recruitment and retention, equipment inventory, fleet trends, international capability comparison, procurement affordability, major programme delivery, industry concentration, and competition rates."
  tags: [defence, military, NATO, spending, armed forces, equipment, tanks, aircraft, ships, submarines, recruitment, retention, procurement, BAE Systems, affordability, NAO]
  series:
    spendingPctGdp:
      title: "Defence Spending as % of GDP"
      summary: "UK defence spending fell from 3.8% GDP in 1990 to 2.3% in 2024, above NATO's 2% target but below the new 2.5% aspiration."
      unit: "% GDP"
    spendingReal:
      title: "Defence Spending in Real Terms"
      summary: "Real defence spending fell from £46bn in 2009 to £38bn in 2016, recovering to £54.2bn in 2024 (2023-24 prices)."
      unit: "£bn"
    intlComparison:
      title: "NATO Spending Comparison"
      summary: "Defence spending as % GDP across NATO allies. Poland leads (3.9%), UK at 2.3%, several allies below 2%."
      unit: "% GDP"
    equipmentPlan:
      title: "Equipment Plan (10-Year)"
      summary: "MoD 10-year equipment plan: £60bn total. Submarines & nuclear £17.2bn, combat air £12.5bn, ships £8.3bn."
      unit: "£bn"
    personnel:
      title: "Armed Forces Personnel"
      summary: "UK regular forces declined 39% from 207.7k in 2000 to 125.7k in 2025. Army from 110k to 70k."
      unit: "thousands"
    reserves:
      title: "Reserve Forces Strength"
      summary: "Trained reserve strength peaked at 30.7k in 2022, declined to 26k in 2024, recovered to 29.1k in 2025."
      unit: "thousands"
    strengthVsRequirement:
      title: "Trained Strength vs Requirement"
      summary: "All services below target: Army -3%, RN/RM -8%, RAF -13%. Overall 6% (8,590 personnel) below requirement."
      unit: "thousands"
    intakeOutflow:
      title: "Recruitment Intake vs Outflow"
      summary: "13,450 joined in 2024-25 (up 19%), 14,600 left (down 7%). Outflow has exceeded intake in most years since 2000."
      unit: "thousands"
    voluntaryOutflow:
      title: "Voluntary Outflow Rate"
      summary: "Voluntary outflow rate peaked at 6.4% in 2023-24, fell to 5.9% in 2024-25. Army highest at 6.3%."
      unit: "%"
    currentEquipment:
      title: "Current Equipment Inventory"
      summary: "Major platforms at 1 April 2025: 288 Challenger 2 MBT, 129 Typhoon, 41 F-35B, 50 Apache, 6 Type 45 destroyers, 7 Type 23 frigates, 10 submarines."
      unit: "count"
    escortFleet:
      title: "Escort Fleet Trend"
      summary: "Royal Navy escort fleet contracted from 48 ships (1990) to 13 (2025). Type 26/31 programmes will restore frigates to 13."
      unit: "ships"
    combatAircraft:
      title: "Combat Aircraft Fleet Trend"
      summary: "Combat-capable fast jets declined from 250 (2000) to 170 (2025). Tornado and Harrier retired; Typhoon and F-35B now form fleet."
      unit: "aircraft"
    intlEquipment:
      title: "International Equipment Comparison"
      summary: "UK equipment vs peer nations (France, Germany, Italy, Japan, S. Korea, Turkey, Australia). UK has fewer tanks than France/Germany but unique carrier and nuclear sub capability."
      unit: "count"
    equipmentPlanAffordability:
      title: "Equipment Plan Affordability"
      summary: "NAO annual assessment of MoD Equipment Plan. Funding gap rose from zero in 2012-22 to £16.9bn in 2023-33, the largest since reporting began."
      unit: "£bn"
    majorProgrammes:
      title: "Major Programme Cost & Schedule"
      summary: "8 major programmes tracked: Ajax (77% cost growth, paused), Type 26 (114% growth), Dreadnought (11% growth), F-35B (21% growth), Boxer (79% growth). Most delayed from original in-service dates."
      unit: "£bn"
    industryConcentration:
      title: "Industry Concentration"
      summary: "BAE Systems received 16.3% of MoD procurement spend (£6.7bn) in 2024-25, the highest single-supplier share since records began. Top 10 suppliers account for 39%."
      unit: "£bn / %"
    competitionRate:
      title: "Competition vs Non-Competitive Procurement"
      summary: "Competitive procurement fell from 31% of MoD spend in 2014-15 to 8% in 2024-25. Non-competitive sourcing rose to 45%, driven by nuclear and combat air programmes."
      unit: "%"
    smeShare:
      title: "SME Share of MoD Procurement"
      summary: "Direct SME share of MoD expenditure remained around 3.5-5% since 2016-17. Including indirect spending through prime contractors, total SME share was 25.5% in 2021-22."
      unit: "%"

startups:
  title: "Business Startups & Entrepreneurship"
  geography: "United Kingdom"
  summary: "Business births and deaths, survival rates, sector breakdown, high-growth firms, and equity investment."
  tags: [startups, business, entrepreneurship, SMEs, venture capital]
  series:
    demographics:
      title: "Business Births & Deaths"
      summary: "Annual business births and deaths. Birth rate around 54 per 10k, death rate around 47 per 10k in 2023."
      unit: "count"
    survival:
      title: "Survival Rates by Cohort"
      summary: "1 to 5 year survival rates for business birth cohorts. 5-year survival around 38%."
      unit: "%"
    sectors:
      title: "New Businesses by Sector"
      summary: "Sector breakdown of business births. Professional/scientific and construction lead."
      unit: "count"
    highGrowth:
      title: "High-Growth Firms"
      summary: "Firms with 20%+ annualised employment growth over 3 years."
      unit: "count"

research:
  title: "Research & Development"
  geography: "United Kingdom"
  summary: "R&D spending by sector (government, business, higher education), as % of GDP, and international comparison."
  tags: [R&D, research, science, innovation, universities]
  series:
    bySector:
      title: "R&D Expenditure by Sector"
      summary: "UK GERD by funding source: business (£30.5bn), government (£2.7bn), higher education (£11.2bn) in 2022."
      unit: "£m"
    gdpPct:
      title: "R&D as % of GDP"
      summary: "UK R&D spending at 2.36% of GDP in 2022, below OECD average of 2.73%."
      unit: "% GDP"
    publicPrivate:
      title: "Public vs Private R&D Split"
      summary: "Private sector funds around 55% of UK R&D, government around 25%."
      unit: "£m"

productivity:
  title: "Productivity"
  geography: "United Kingdom"
  summary: "Output per hour worked (index and level), sector breakdown, and international comparison."
  tags: [productivity, output, efficiency, GDP per hour]
  series:
    outputPerHour:
      title: "Output per Hour Worked"
      summary: "UK output per hour index (2023=100). Productivity growth has been weak since 2008."
      unit: "index"
    international:
      title: "International Productivity Comparison"
      summary: "UK output per hour relative to G7 peers. UK trails US, Germany, and France."
      unit: "US$ PPP"
    sectors:
      title: "Productivity by Sector"
      summary: "Output per hour by industry. Financial services highest, accommodation lowest."
      unit: "£ per hour"

investment:
  title: "Investment"
  geography: "United Kingdom"
  summary: "UK gross fixed capital formation trend, asset breakdown, and international comparison."
  tags: [investment, capital, GFCF, infrastructure]
  series:
    gfcfTrend:
      title: "Gross Fixed Capital Formation"
      summary: "UK GFCF as % of GDP, consistently around 17-18%, below OECD average of ~21%."
      unit: "% GDP"
    byAsset:
      title: "Investment by Asset Type"
      summary: "Breakdown by dwellings, other buildings, transport, ICT, and intellectual property."
      unit: "£bn"
    international:
      title: "International Comparison"
      summary: "UK investment as % of GDP compared to OECD peers. UK near bottom of G7."
      unit: "% GDP"

immigration:
  title: "Immigration & Demographics"
  geography: "United Kingdom"
  summary: "Net migration, visa breakdown, asylum applications, population projections, age structure, and dependency ratios."
  tags: [immigration, migration, population, demographics, asylum, visas]

